<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Tauro's Barbería</title>
  <link rel="icon" type="image/png" href="img/logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>

  <h1>TAURO<span>'S</span></h1>
  <p class="sub">Panel de administración</p>

  <!-- Login -->
  <div class="login-box" id="loginBox">
    <h2>Acceso</h2>
    <p class="error" id="loginError">Credenciales incorrectas</p>
    <input type="email" id="emailInput" placeholder="Correo electrónico" autocomplete="email" onkeydown="if(event.key==='Enter') document.getElementById('passwordInput').focus()"/>
    <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter') checkPassword()"/>
    <button class="btn" onclick="checkPassword()">Entrar</button>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="bar">
      <div class="total-citas" id="totalLabel">Cargando...</div>
      <div class="bar-actions">
        <button class="btn-sm" onclick="loadCitas()">↻ Actualizar</button>
        <span class="logout-link" onclick="logout()">Salir</span>
      </div>
    </div>

    <div class="citas-list" id="citasList">
      <div class="loading">Cargando citas...</div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
