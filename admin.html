<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Tauro's Barbería</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0a0a0a; --white: #f5f5f5; --gold: #c9a84c; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      padding: 32px 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--white);
    }
    h1 span { color: var(--gold); }
    .sub {
      color: #555;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 4px 0 28px;
    }

    /* Login */
    .login-box {
      max-width: 360px;
      margin: 60px auto;
      background: #111;
      border: 1px solid #222;
      padding: 36px;
      text-align: center;
    }
    .login-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
    .login-box input {
      width: 100%;
      background: #181818;
      border: 1px solid #242424;
      color: var(--white);
      padding: 11px 14px;
      font-size: 0.82rem;
      font-family: 'Montserrat', sans-serif;
      outline: none;
      margin-bottom: 10px;
      text-align: center;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-box .error {
      color: #e74c3c;
      font-size: 0.75rem;
      margin-bottom: 10px;
      display: none;
    }
    .btn {
      background: var(--white);
      color: var(--black);
      border: none;
      padding: 11px 28px;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: background 0.2s;
      width: 100%;
    }
    .btn:hover { background: var(--gold); color: var(--white); }

    /* Dashboard */
    .dashboard { display: none; }
    .dashboard.show { display: block; }

    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .total-citas {
      font-size: 0.9rem;
      color: #888;
    }
    .total-citas strong { color: var(--white); font-size: 1.3rem; }

    .bar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn-sm {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: var(--white);
      padding: 7px 18px;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: border-color 0.2s;
    }
    .btn-sm:hover { border-color: var(--gold); }
    .logout-link {
      color: #555;
      font-size: 0.6rem;
      cursor: pointer;
      text-decoration: underline;
    }
    .logout-link:hover { color: var(--gold); }

    /* Lista de citas */
    .citas-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cita-card {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .cita-card:hover { border-color: #2a2a2a; }

    .cita-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .cita-num {
      font-size: 0.6rem;
      color: #444;
      font-weight: 600;
      min-width: 24px;
    }

    .cita-cliente {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .cita-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .cita-meta span {
      font-size: 0.7rem;
      color: #888;
    }
    .cita-meta .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 2px 10px;
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--gold);
    }
    .cita-meta .barbero-label {
      color: var(--gold);
      font-weight: 600;
    }
    .cita-fecha {
      font-size: 0.75rem;
      color: #aaa;
      font-weight: 500;
    }
    .cita-telefono {
      font-size: 0.7rem;
      color: #555;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #444;
    }
    .empty-state p { font-size: 0.85rem; }
    .empty-state .icon { font-size: 2rem; margin-bottom: 10px; display: block; }

    .loading {
      text-align: center;
      padding: 40px;
      color: #555;
      font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      body { padding: 20px 12px; }
      .cita-card { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <h1>TAURO<span>'S</span></h1>
  <p class="sub">Panel de administración</p>

  <!-- Login -->
  <div class="login-box" id="loginBox">
    <h2>Acceso</h2>
    <p class="error" id="loginError">Credenciales incorrectas</p>
    <input type="email" id="emailInput" placeholder="Correo electrónico" autocomplete="email" onkeydown="if(event.key==='Enter') document.getElementById('passwordInput').focus()"/>
    <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter') checkPassword()"/>
    <button class="btn" onclick="checkPassword()">Entrar</button>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="bar">
      <div class="total-citas" id="totalLabel">Cargando...</div>
      <div class="bar-actions">
        <button class="btn-sm" onclick="loadCitas()">↻ Actualizar</button>
        <span class="logout-link" onclick="logout()">Salir</span>
      </div>
    </div>

    <div class="citas-list" id="citasList">
      <div class="loading">Cargando citas...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://mvzpwsvtmxegxsphwfcj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0Op1mZxcjbTfwzGylMTBOw_AZILx-MI';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ADMIN_EMAIL = 'admin@tauros.com';
    const ADMIN_PASSWORD = 'tauros2025';

    const DAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

    function checkPassword() {
      const email = document.getElementById('emailInput').value.trim();
      const pwd   = document.getElementById('passwordInput').value;
      if (email === ADMIN_EMAIL && pwd === ADMIN_PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('dashboard').classList.add('show');
        loadCitas();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function logout() {
      document.getElementById('dashboard').classList.remove('show');
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('emailInput').value = '';
      document.getElementById('loginError').style.display = 'none';
    }

    function to12h(h) {
      const suffix = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      return `${h12}:00 ${suffix}`;
    }

    function fmtDate(f) {
      const d = new Date(f + 'T12:00:00');
      return `${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`;
    }

    async function loadCitas() {
      const list = document.getElementById('citasList');
      list.innerHTML = '<div class="loading">Cargando citas...</div>';

      const { data, error } = await sb
        .from('citas')
        .select('*')
        .order('fecha', { ascending: false })
        .order('hora_inicio', { ascending: false });

      if (error) {
        list.innerHTML = `<div class="empty-state"><span class="icon">⚠</span><p>Error: ${error.message}</p></div>`;
        document.getElementById('totalLabel').innerHTML = 'Error';
        return;
      }

      if (!data || data.length === 0) {
        list.innerHTML = '<div class="empty-state"><span class="icon">📅</span><p>No hay citas registradas</p></div>';
        document.getElementById('totalLabel').innerHTML = '<strong>0</strong> citas';
        return;
      }

      document.getElementById('totalLabel').innerHTML = `<strong>${data.length}</strong> cita${data.length !== 1 ? 's' : ''}`;

      // Mostrar citas como tarjetas
      let html = '';
      data.forEach((c, i) => {
        const num = data.length - i;
        html += `
          <div class="cita-card">
            <div class="cita-left">
              <span class="cita-num">#${num}</span>
              <span class="cita-cliente">${c.nombre || '—'}</span>
              <span class="cita-telefono">${c.telefono || ''}</span>
            </div>
            <div class="cita-meta">
              <span class="badge">${c.servicio || '—'}</span>
              <span class="barbero-label">${c.barbero || '—'}</span>
              <span class="cita-fecha">${fmtDate(c.fecha)}</span>
              <span>${to12h(c.hora_inicio)} – ${to12h(c.hora_fin)}</span>
            </div>
          </div>`;
      });

      list.innerHTML = html;
    }
  </script>
</body>
</html>
